name: QuickPalm Analyser CI/CD

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install \
            psutil==5.9.8 \
            prometheus_client==0.20.0 \
            scikit-learn==1.4.2 \
            pandas==2.2.2 \
            numpy==1.26.4 \
            requests==2.31.0 \
            fastapi==0.111.0 \
            pydantic==2.7.1 \
            jinja2==3.1.4 \
            -r tests/requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          mkdir -p ~/.docker/cli-plugins
          curl -SL https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64 \
            -o ~/.docker/cli-plugins/docker-compose
          chmod +x ~/.docker/cli-plugins/docker-compose

      - name: Build images
        run: docker compose build

      - name: Start core services
        run: docker compose up -d collector prometheus grafana ml

      - name: Wait for services
        run: |
          echo "Waiting for Collector..."
          timeout 30 bash -c 'until curl -sf http://localhost:8000/metrics; do sleep 2; done'
          echo "Waiting for Prometheus..."
          timeout 30 bash -c 'until curl -sf http://localhost:9090/-/healthy; do sleep 2; done'
          echo "Waiting for Grafana..."
          timeout 30 bash -c 'until curl -sf http://localhost:3000/api/health; do sleep 2; done'

      - name: Test collector metrics
        run: |
          output=$(curl -sf http://localhost:8000/metrics)
          echo "$output" | grep -q "node_cpu_percent"  || (echo "FAIL: node_cpu_percent missing" && exit 1)
          echo "$output" | grep -q "node_ram_percent"  || (echo "FAIL: node_ram_percent missing" && exit 1)
          echo "$output" | grep -q "node_disk_percent" || (echo "FAIL: node_disk_percent missing" && exit 1)
          echo "Collector: OK"

      - name: Test Prometheus scraping
        run: |
          sleep 10
          result=$(curl -sf "http://localhost:9090/api/v1/query?query=node_cpu_percent" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d['data']['result']))")
          [ "$result" -gt "0" ] || (echo "FAIL: Prometheus not scraping" && exit 1)
          echo "Prometheus: OK ($result series)"

      - name: Test ML service
        run: |
          timeout 90 bash -c 'until curl -sf http://localhost:8001/metrics | grep -q "ml_runs_total"; do sleep 5; done'
          echo "ML Service: OK"

      - name: Test Chat API
        run: |
          docker compose up -d chat
          timeout 20 bash -c 'until curl -sf http://localhost:8080/status; do sleep 2; done'
          status=$(curl -sf http://localhost:8080/status)
          echo "$status" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'metrics' in d" \
            || (echo "FAIL: /status missing metrics key" && exit 1)
          servers=$(curl -sf http://localhost:8080/servers)
          echo "$servers" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'servers' in d" \
            || (echo "FAIL: /servers endpoint missing" && exit 1)
          echo "Chat API: OK"

      - name: Teardown
        if: always()
        run: docker compose down -v

  release:
    name: GitHub Release
    needs: integration-tests
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Create release ZIP
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist
          zip -r dist/quickpalm-${VERSION}.zip . \
            --exclude "*.git*" \
            --exclude "dist/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "QuickPalm Analyser ${{ env.VERSION }}"
          body: |
            ## QuickPalm Analyser ${{ env.VERSION }}

            ### Install
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd quickpalm_analyser
            ./install.sh
            ```

            ### What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          files: dist/quickpalm-${{ env.VERSION }}.zip
          draft: false
          prerelease: false
