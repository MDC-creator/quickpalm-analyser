---
- name: PredictOps Server Setup
  hosts: predictops
  become: true

  vars:
    project_dir: /opt/predictops
    github_repo: "https://github.com/YOUR-USERNAME/predictops.git"
    ollama_model: "llama3.2:1b"

  tasks:

    # ── System ────────────────────────────────────────────────────────────
    - name: Update system packages
      apt:
        update_cache: yes
        upgrade: dist

    - name: Install required packages
      apt:
        name: [git, curl, ufw]
        state: present

    # ── Firewall ──────────────────────────────────────────────────────────
    - name: UFW — allow SSH
      ufw:
        rule: allow
        port: "22"

    - name: UFW — allow HTTP
      ufw:
        rule: allow
        port: "80"

    - name: UFW — allow HTTPS
      ufw:
        rule: allow
        port: "443"

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny

    # ── Deploy project ────────────────────────────────────────────────────
    - name: Create project directory
      file:
        path: "{{ project_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu

    - name: Clone / update repository
      git:
        repo: "{{ github_repo }}"
        dest: "{{ project_dir }}"
        version: main
        force: yes
      become_user: ubuntu

    # ── Start Docker services ─────────────────────────────────────────────
    - name: Build Docker images
      shell: docker compose build
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu

    - name: Start all services
      shell: docker compose up -d
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu

    # ── Load Ollama model ─────────────────────────────────────────────────
    - name: Wait for Ollama to be ready
      wait_for:
        host: localhost
        port: 11434
        delay: 10
        timeout: 120

    - name: Download LLM model
      shell: "docker exec predictops-ollama ollama pull {{ ollama_model }}"
      become_user: ubuntu
      ignore_errors: yes

    # ── Health Check ──────────────────────────────────────────────────────
    - name: Check Chat Interface reachable
      uri:
        url: "http://localhost/status"
        status_code: 200
      register: health
      retries: 5
      delay: 5

    - name: Deployment status
      debug:
        msg: "PredictOps is running! Chat: http://{{ ansible_host }}"
