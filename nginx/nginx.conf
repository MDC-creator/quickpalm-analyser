events {
    worker_connections 1024;
}

http {
    upstream grafana  { server grafana:3000; }
    upstream chat     { server chat:8080; }
    upstream prometheus { server prometheus:9090; }

    # Gzip
    gzip on;
    gzip_types text/plain application/json text/css application/javascript;

    server {
        listen 80;
        server_name _;

        # Chat Interface — Hauptseite
        location / {
            proxy_pass         http://chat;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        # Grafana Dashboard
        location /grafana/ {
            proxy_pass         http://grafana/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            # Grafana braucht diese Header für Subpath
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Prometheus (intern, nur für Debugging)
        location /prometheus/ {
            proxy_pass         http://prometheus/;
            proxy_set_header   Host $host;
        }
    }
}
